name: Server Test

on:
  workflow_dispatch:  # Allow manual triggering

jobs:
  test-server:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'  # Adjust based on your modpack's requirements
      
      - name: Get latest pre-release
        id: get_release
        run: |
          # Option 1: Target specific tag "latest"
          RELEASE_DATA=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/latest")
          
          # Option 2: Get most recent pre-release (uncomment if preferred)
          # RELEASE_DATA=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          #   "https://api.github.com/repos/${{ github.repository }}/releases")
          # RELEASE_DATA=$(echo "$RELEASE_DATA" | jq '[.[] | select(.prerelease == true)] | .[0]')
          
          DOWNLOAD_URL=$(echo "$RELEASE_DATA" | jq -r '.assets[0].browser_download_url')
          echo "download_url=$DOWNLOAD_URL" >> $GITHUB_OUTPUT
          echo "Downloading from: $DOWNLOAD_URL"
      
      - name: Download and extract pre-release
        run: |
          wget -O server.zip "${{ steps.get_release.outputs.download_url }}"
          mkdir -p server_temp
          unzip server.zip -d server_temp/
          
          # Check if files are in a subdirectory
          echo "=== Extracted structure ==="
          ls -la server_temp/
          echo "=========================="
          
          # If there's only one directory, move its contents up
          if [ $(ls -1 server_temp/ | wc -l) -eq 1 ] && [ -d "server_temp/$(ls server_temp/)" ]; then
            echo "Files are in a subdirectory, moving up..."
            mv server_temp/*/* server/
          else
            echo "Files are at root level, moving..."
            mv server_temp/* server/
          fi
          
          rmdir server_temp || true
          
          echo "=== Final server directory ==="
          ls -la server/
          echo "=============================="
      
      - name: Download additional mods from Google Drive
        run: |
          # Install gdown for Google Drive downloads
          pip install gdown -q
          
          # Download mods folder (use folder ID from Google Drive URL)
          # Format: https://drive.google.com/drive/folders/FOLDER_ID
          # Suppress output to avoid leaking the secret URL
          gdown --folder "${{ secrets.GDRIVE_MODS_URL }}" -O additional_mods/ > /dev/null 2>&1
          
          echo "✓ Additional mods downloaded successfully"
      
      - name: Setup server files
        run: |
          cd server
          
          # Show what files we have
          echo "=== Files in server directory ==="
          ls -la
          echo "================================="
          
          # Find and verify the server jar
          JAR_NAME="minecraft_server.1.12.2.jar"
          
          if [ -f "$JAR_NAME" ]; then
            echo "✓ Found $JAR_NAME"
          else
            echo "ERROR: $JAR_NAME not found!"
            echo "Available jar files:"
            find . -name "*.jar" -type f
            exit 1
          fi
          
          # Sign EULA
          echo "eula=true" > eula.txt
          
          # Copy additional mods from downloaded folder
          mkdir -p mods
          if [ -d ../additional_mods/ ] && [ "$(ls -A ../additional_mods/)" ]; then
            cp -r ../additional_mods/* mods/
            echo "✓ Copied additional mods"
          else
            echo "⚠ No additional mods to copy"
          fi
      
      - name: Run server until ready
        run: |
          cd server
          
          JAR_NAME="minecraft_server.1.12.2.jar"
          
          echo "=== Pre-flight checks ==="
          echo "Java version:"
          java -version
          echo "Working directory: $(pwd)"
          echo "Server jar exists: $([ -f $JAR_NAME ] && echo 'yes' || echo 'no')"
          if [ -f $JAR_NAME ]; then
            echo "Server jar size: $(ls -lh $JAR_NAME | awk '{print $5}')"
          fi
          echo "========================="
          
          # Start server in background
          java -Xmx4G -Xms4G -jar $JAR_NAME nogui > server_output.log 2>&1 &
          SERVER_PID=$!
          
          echo "Server started with PID: $SERVER_PID"
          
          # Give it a moment to actually start
          sleep 2
          
          # Wait for the ready message
          timeout 200 bash -c '
            while true; do
              # Check if server process is still running
              if ! kill -0 $SERVER_PID 2>/dev/null; then
                echo "ERROR: Server process died unexpectedly!"
                echo "=== Server output log ==="
                cat server_output.log 2>/dev/null || echo "No server output found"
                echo "=== Latest log (if exists) ==="
                cat logs/latest.log 2>/dev/null || echo "No latest.log found"
                echo "=== Check for crash reports ==="
                ls -la crash-reports/ 2>/dev/null || echo "No crash-reports directory"
                exit 1
              fi
              
              if [ -f logs/latest.log ] && grep -q "\[FTB Library\]: Reloaded server" logs/latest.log; then
                echo "Server is ready!"
                break
              fi
              
              # Show last line of log to detect stalls
              if [ -f logs/latest.log ]; then
                echo "=== Last server log line ==="
                tail -n 1 logs/latest.log
                echo "============================"
              else
                echo "Waiting for logs/latest.log to be created..."
                echo "=== Current server output (last 5 lines) ==="
                tail -n 5 server_output.log 2>/dev/null || echo "No output yet"
                echo "============================"
              fi
              
              sleep 5
            done
          ' || {
            echo "Timeout waiting for server to be ready"
            echo "=== Last 20 lines of server log ==="
            tail -n 20 logs/latest.log 2>/dev/null || echo "No log file found"
            echo "=== Full server output ==="
            cat server_output.log 2>/dev/null || echo "No server output found"
            kill $SERVER_PID 2>/dev/null || true
            exit 1
          }
          
          # Stop the server gracefully
          kill $SERVER_PID
          wait $SERVER_PID 2>/dev/null || true
          
          echo "Server stopped successfully"
      
      - name: Check for Groovy errors
        run: |
          cd server
          
          if [ -f logs/groovy.log ]; then
            if grep -q "An exception occurred while running scripts." logs/groovy.log; then
              echo "ERROR: Groovy script errors detected!"
              echo "=== Groovy Log Contents ==="
              cat logs/groovy.log
              exit 1
            else
              echo "No Groovy errors detected"
            fi
          else
            echo "Warning: groovy.log not found"
          fi
      
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: server-logs
          path: |
            server/logs/
            server/server_output.log
          retention-days: 3
      
      - name: Report success
        if: success()
        run: echo "✅ Server test completed successfully!"
